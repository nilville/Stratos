<!DOCTYPE html>
<html lang="en" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Insights | Football Analytics</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Lexend:wght@300;500;700&family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .main-wrapper {
            width: 100%;
            max-width: 620px;
            padding: 20px;
            margin: auto;
            animation: fadeIn 0.8s ease-out;
        }

        .logo {
            font-family: 'Lexend', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 6px;
            color: var(--accent);
            text-align: center;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .hero-text { text-align: center; margin-bottom: 40px; }
        .hero-text h1 { font-family: 'Lexend', sans-serif; font-size: 40px; font-weight: 500; margin: 0; letter-spacing: -1.5px; }
        .hero-text p { color: var(--text-dim); font-size: 16px; margin-top: 12px; font-weight: 300; }

        .search-container {
            padding: 40px;
        }

        .input-pair { display: flex; flex-direction: column; gap: 32px; margin-bottom: 40px; }
        .field-label { font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; display: block; }
        
        .team-box { display: flex; flex-direction: column; }

        input {
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 18px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s ease;
            width: 100%;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
            background: #1c1c21;
        }

        .league-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-top: 10px;
        }

        .league-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 6px 4px;
            color: var(--text-dim);
            font-size: 9px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            text-align: center;
        }

        .league-btn:hover {
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .league-btn.active {
            background: rgba(46, 204, 113, 0.1);
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .league-btn .icon {
            font-size: 16px;
        }

        .btn-analyze {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 18px;
            padding: 22px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
        }

        .btn-analyze:hover { transform: translateY(-3px); box-shadow: 0 15px 30px -5px var(--accent-glow); }
        
        .error-card {
            background: rgba(255, 77, 77, 0.08);
            border: 1px solid rgba(255, 77, 77, 0.2);
            color: var(--error);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 24px;
            font-size: 13px;
            text-align: center;
        }

        #loader { display: none; text-align: center; margin-top: 24px; font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }
    </style>
</head>
<body class="main-body">
    <button class="lang-toggle" onclick="toggleLang()" id="lang-btn">العربية</button>

    <div class="main-wrapper">
        <div class="logo" id="txt-logo">Core Analytics</div>
        
        <div class="hero-text">
            <h1 id="txt-title">Advanced Simulation</h1>
            <p id="txt-subtitle">Professional grade modeling for match outcomes.</p>
        </div>

        <div class="search-container glass-panel">
            <div id="error-box" class="error-card" style="display: {% if error_code or error %}block{% else %}none{% endif %};">
                <span id="txt-error-msg">
                    {% if error_code == 'NOT_FOUND' %}Team '{{ error_team }}' not found.{% elif error_code == 'RATE_LIMIT' %}Limit hit. Wait 60s.{% else %}{{ error }}{% endif %}
                </span>
            </div>

            <form action="/analyze" method="POST" onsubmit="showLoader()">
                <div class="input-pair">
                    <div>
                        <label for="team_a_input" class="field-label" id="txt-home-label">Home Side</label>
                        <div class="team-box">
                            <input type="text" id="team_a_input" name="team_a" placeholder="Arsenal" aria-required="true" required>
                            <div class="league-grid" id="grid-a" role="radiogroup" aria-label="Select home league">
                                <button type="button" class="league-btn active" data-value="PL" data-icon="🇬🇧" aria-checked="true">
                                    <span class="icon">🇬🇧</span>
                                    <span class="name">Premier League</span>
                                </button>
                                <button type="button" class="league-btn" data-value="PD" data-icon="🇪🇸" aria-checked="false">
                                    <span class="icon">🇪🇸</span>
                                    <span class="name">La Liga</span>
                                </button>
                                <button type="button" class="league-btn" data-value="BL1" data-icon="🇩🇪" aria-checked="false">
                                    <span class="icon">🇩🇪</span>
                                    <span class="name">Bundesliga</span>
                                </button>
                                <button type="button" class="league-btn" data-value="SA" data-icon="🇮🇹" aria-checked="false">
                                    <span class="icon">🇮🇹</span>
                                    <span class="name">Serie A</span>
                                </button>
                                <button type="button" class="league-btn" data-value="FL1" data-icon="🇫🇷" aria-checked="false">
                                    <span class="icon">🇫🇷</span>
                                    <span class="name">Ligue 1</span>
                                </button>
                                <button type="button" class="league-btn" data-value="DED" data-icon="🇳🇱" aria-checked="false">
                                    <span class="icon">🇳🇱</span>
                                    <span class="name">Eredivisie</span>
                                </button>
                            </div>
                            <input type="hidden" name="league_a" id="league_a" value="PL">
                        </div>
                    </div>

                    <div>
                        <label for="team_b_input" class="field-label" id="txt-away-label">Away Side</label>
                        <div class="team-box">
                            <input type="text" id="team_b_input" name="team_b" placeholder="Liverpool" aria-required="true" required>
                            <div class="league-grid" id="grid-b" role="radiogroup" aria-label="Select away league">
                                <button type="button" class="league-btn active" data-value="PL" data-icon="🇬🇧" aria-checked="true">
                                    <span class="icon">🇬🇧</span>
                                    <span class="name">Premier League</span>
                                </button>
                                <button type="button" class="league-btn" data-value="PD" data-icon="🇪🇸" aria-checked="false">
                                    <span class="icon">🇪🇸</span>
                                    <span class="name">La Liga</span>
                                </button>
                                <button type="button" class="league-btn" data-value="BL1" data-icon="🇩🇪" aria-checked="false">
                                    <span class="icon">🇩🇪</span>
                                    <span class="name">Bundesliga</span>
                                </button>
                                <button type="button" class="league-btn" data-value="SA" data-icon="🇮🇹" aria-checked="false">
                                    <span class="icon">🇮🇹</span>
                                    <span class="name">Serie A</span>
                                </button>
                                <button type="button" class="league-btn" data-value="FL1" data-icon="🇫🇷" aria-checked="false">
                                    <span class="icon">🇫🇷</span>
                                    <span class="name">Ligue 1</span>
                                </button>
                                <button type="button" class="league-btn" data-value="DED" data-icon="🇳🇱" aria-checked="false">
                                    <span class="icon">🇳🇱</span>
                                    <span class="name">Eredivisie</span>
                                </button>
                            </div>
                            <input type="hidden" name="league_b" id="league_b" value="PL">
                        </div>
                    </div>
                </div>

                <input type="hidden" name="lang" id="lang-input" value="{{ lang or 'en' }}">
                <button type="submit" class="btn-analyze" id="txt-btn">Generate Insight</button>
            </form>
            <div id="loader" id="txt-loader">Processing match variables...</div>
        </div>
    </div>

    <script>
        const translations = {
            en: {
                logo: "Core Analytics", 
                title: "Advanced Simulation", 
                subtitle: "Professional grade modeling for match outcomes.",
                home: "Home Side", 
                away: "Away Side", 
                btn: "Generate Insight", 
                loader: "Processing match variables...",
                toggle: "العربية", 
                err_not_found: "Team '{team}' not found.",
                leagues: { 
                    PL: "Premier League", 
                    PD: "La Liga", 
                    BL1: "Bundesliga", 
                    SA: "Serie A", 
                    FL1: "Ligue 1", 
                    DED: "Eredivisie" 
                }
            },
            ar: {
                logo: "التحليلات الجوهرية", 
                title: "محاكاة متقدمة", 
                subtitle: "نمذجة احترافية لتوقعات نتائج المباريات.",
                home: "الفريق المستضيف", 
                away: "الفريق الضيف", 
                btn: "تحليل المباراة", 
                loader: "جاري تحليل البيانات...",
                toggle: "English", 
                err_not_found: "لم يتم العثور على الفريق '{team}'.",
                leagues: { 
                    PL: "الدوري الإنجليزي", 
                    PD: "الدوري الإسباني", 
                    BL1: "الدوري الألماني", 
                    SA: "الدوري الإيطالي", 
                    FL1: "الدوري الفرنسي", 
                    DED: "الدوري الهولندي" 
                }
            }
        };

        let currentLang = localStorage.getItem('preferredLang') || "{{ lang or 'en' }}";

        // Button Grid Logic
        document.querySelectorAll('.league-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const grid = this.parentElement;
                const hiddenInput = grid.nextElementSibling;
                const value = this.getAttribute('data-value');

                grid.querySelectorAll('.league-btn').forEach(b => {
                    b.classList.remove('active');
                    b.setAttribute('aria-checked', 'false');
                });
                this.classList.add('active');
                this.setAttribute('aria-checked', 'true');
                hiddenInput.value = value;
            });
        });

        function updateUI(lang) {
            const data = translations[lang];
            const html = document.getElementById('html-tag');
            html.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
            html.setAttribute('lang', lang);

            document.getElementById('txt-logo').innerText = data.logo;
            document.getElementById('txt-title').innerText = data.title;
            document.getElementById('txt-subtitle').innerText = data.subtitle;
            document.getElementById('txt-home-label').innerText = data.home;
            document.getElementById('txt-away-label').innerText = data.away;
            document.getElementById('txt-btn').innerText = data.btn;
            document.getElementById('lang-btn').innerText = data.toggle;
            document.getElementById('lang-input').value = lang;

            // Update Button Labels
            document.querySelectorAll('.league-btn').forEach(btn => {
                const val = btn.getAttribute('data-value');
                btn.querySelector('.name').innerText = data.leagues[val];
            });
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            localStorage.setItem('preferredLang', currentLang);
            updateUI(currentLang);
        }

        function showLoader() {
            document.getElementById('loader').style.display = 'block';
            if(currentLang === 'ar') document.getElementById('loader').innerText = translations.ar.loader;
        }

        // Initialize UI with persistent language
        updateUI(currentLang);
    </script>
</body>
</html>
