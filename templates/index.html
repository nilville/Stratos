<!DOCTYPE html>
<html lang="en" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Insights | Football Analytics</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Lexend:wght@300;500;700&family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .main-wrapper {
            width: 100%;
            max-width: 620px;
            padding: 16px;
            margin: auto;
            animation: fadeIn 0.8s ease-out;
            box-sizing: border-box;
        }

        .logo {
            font-family: 'Lexend', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 6px;
            color: var(--accent);
            text-align: center;
            margin-bottom: 32px;
            text-transform: uppercase;
        }

        .hero-text { text-align: center; margin-bottom: 32px; }
        .hero-text h1 { font-family: 'Lexend', sans-serif; font-size: 36px; font-weight: 500; margin: 0; letter-spacing: -1.5px; line-height: 1.15; }
        .hero-text p { color: var(--text-dim); font-size: 15px; margin-top: 10px; font-weight: 300; }

        .search-container {
            padding: 32px;
        }

        .input-pair { display: flex; flex-direction: column; gap: 28px; margin-bottom: 32px; }
        .field-label { font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; }
        
        .team-box { display: flex; flex-direction: column; }

        input {
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 16px 18px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s ease;
            width: 100%;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
            background: #1c1c21;
        }

        .league-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-top: 10px;
        }

        .league-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 6px 4px;
            color: var(--text-dim);
            font-size: 9px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            text-align: center;
        }

        .league-btn:hover {
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .league-btn.active {
            background: rgba(46, 204, 113, 0.1);
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .league-btn .icon {
            font-size: 16px;
        }

        .league-btn .name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 100%;
        }

        .btn-analyze {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 16px;
            padding: 18px;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
        }

        .btn-analyze:hover { transform: translateY(-3px); box-shadow: 0 15px 30px -5px var(--accent-glow); }
        
        .error-card {
            background: rgba(255, 77, 77, 0.08);
            border: 1px solid rgba(255, 77, 77, 0.2);
            color: var(--error);
            padding: 14px;
            border-radius: 14px;
            margin-bottom: 20px;
            font-size: 13px;
            text-align: center;
        }

        #loader { display: none; text-align: center; margin-top: 20px; font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; align-items: center; justify-content: center; gap: 8px; }
        #loader.visible { display: flex; }

        @media (max-width: 480px) {
            .main-wrapper { padding: 12px; }
            .logo { margin-bottom: 24px; font-size: 10px; letter-spacing: 4px; }
            .hero-text { margin-bottom: 24px; }
            .hero-text h1 { font-size: 26px; letter-spacing: -1px; }
            .hero-text p { font-size: 13px; margin-top: 8px; }
            .search-container { padding: 20px 16px; }
            .input-pair { gap: 20px; margin-bottom: 24px; }
            .field-label { font-size: 9px; letter-spacing: 1.5px; margin-bottom: 8px; }
            input { padding: 14px 16px; font-size: 14px; border-radius: 12px; }
            .league-grid { gap: 4px; margin-top: 8px; }
            .league-btn { padding: 5px 2px; font-size: 8px; border-radius: 8px; gap: 1px; }
            .league-btn .icon { font-size: 14px; }
            .btn-analyze { padding: 16px; font-size: 13px; border-radius: 14px; }
            .error-card { padding: 12px; font-size: 12px; margin-bottom: 16px; border-radius: 12px; }
            #loader { margin-top: 16px; font-size: 10px; }
        }
    </style>
</head>
<body class="main-body">
    <button class="lang-toggle" onclick="toggleLang()" id="lang-btn" data-i18n="toggle">العربية</button>

    <div class="main-wrapper">
        <div class="logo" data-i18n="logo" id="txt-logo">Core Analytics</div>
        
        <div class="hero-text">
            <h1 data-i18n="title" id="txt-title">Advanced Simulation</h1>
            <p data-i18n="subtitle" id="txt-subtitle">Professional grade modeling for match outcomes.</p>
        </div>

        <div class="search-container glass-panel">
            <div id="error-box" class="error-card" style="display: {% if error_code or error %}block{% else %}none{% endif %};">
                <span id="txt-error-msg">
                    {% if error_code == 'NOT_FOUND' %}Team '{{ error_team }}' not found.{% elif error_code == 'RATE_LIMIT' %}Limit hit. Wait 60s.{% else %}{{ error }}{% endif %}
                </span>
            </div>

            <form action="/analyze" method="POST" onsubmit="showLoader()">
                <div class="input-pair">
                    <div>
                        <label for="team_a_input" class="field-label" data-i18n="home" id="txt-home-label">Home Side</label>
                        <div class="team-box">
                            <input type="text" id="team_a_input" name="team_a" placeholder="Arsenal" aria-required="true" required list="team-suggestions-a" autocomplete="off">
                            <div class="league-grid" id="grid-a" role="radiogroup" aria-label="Select home league">
                                <button type="button" class="league-btn active" data-value="PL" data-icon="🇬🇧" aria-checked="true">
                                    <span class="icon">🇬🇧</span>
                                    <span class="name" data-i18n-league="PL">Premier League</span>
                                </button>
                                <button type="button" class="league-btn" data-value="PD" data-icon="🇪🇸" aria-checked="false">
                                    <span class="icon">🇪🇸</span>
                                    <span class="name" data-i18n-league="PD">La Liga</span>
                                </button>
                                <button type="button" class="league-btn" data-value="BL1" data-icon="🇩🇪" aria-checked="false">
                                    <span class="icon">🇩🇪</span>
                                    <span class="name" data-i18n-league="BL1">Bundesliga</span>
                                </button>
                                <button type="button" class="league-btn" data-value="SA" data-icon="🇮🇹" aria-checked="false">
                                    <span class="icon">🇮🇹</span>
                                    <span class="name" data-i18n-league="SA">Serie A</span>
                                </button>
                                <button type="button" class="league-btn" data-value="FL1" data-icon="🇫🇷" aria-checked="false">
                                    <span class="icon">🇫🇷</span>
                                    <span class="name" data-i18n-league="FL1">Ligue 1</span>
                                </button>
                                <button type="button" class="league-btn" data-value="DED" data-icon="🇳🇱" aria-checked="false">
                                    <span class="icon">🇳🇱</span>
                                    <span class="name" data-i18n-league="DED">Eredivisie</span>
                                </button>
                            </div>
                            <input type="hidden" name="league_a" id="league_a" value="PL">
                        </div>
                    </div>

                    <div>
                        <label for="team_b_input" class="field-label" data-i18n="away" id="txt-away-label">Away Side</label>
                        <div class="team-box">
                            <input type="text" id="team_b_input" name="team_b" placeholder="Liverpool" aria-required="true" required list="team-suggestions-b" autocomplete="off">
                            <div class="league-grid" id="grid-b" role="radiogroup" aria-label="Select away league">
                                <button type="button" class="league-btn active" data-value="PL" data-icon="🇬🇧" aria-checked="true">
                                    <span class="icon">🇬🇧</span>
                                    <span class="name" data-i18n-league="PL">Premier League</span>
                                </button>
                                <button type="button" class="league-btn" data-value="PD" data-icon="🇪🇸" aria-checked="false">
                                    <span class="icon">🇪🇸</span>
                                    <span class="name" data-i18n-league="PD">La Liga</span>
                                </button>
                                <button type="button" class="league-btn" data-value="BL1" data-icon="🇩🇪" aria-checked="false">
                                    <span class="icon">🇩🇪</span>
                                    <span class="name" data-i18n-league="BL1">Bundesliga</span>
                                </button>
                                <button type="button" class="league-btn" data-value="SA" data-icon="🇮🇹" aria-checked="false">
                                    <span class="icon">🇮🇹</span>
                                    <span class="name" data-i18n-league="SA">Serie A</span>
                                </button>
                                <button type="button" class="league-btn" data-value="FL1" data-icon="🇫🇷" aria-checked="false">
                                    <span class="icon">🇫🇷</span>
                                    <span class="name" data-i18n-league="FL1">Ligue 1</span>
                                </button>
                                <button type="button" class="league-btn" data-value="DED" data-icon="🇳🇱" aria-checked="false">
                                    <span class="icon">🇳🇱</span>
                                    <span class="name" data-i18n-league="DED">Eredivisie</span>
                                </button>
                            </div>
                            <input type="hidden" name="league_b" id="league_b" value="PL">
                        </div>
                    </div>
                </div>

                <datalist id="team-suggestions-a"></datalist>
                <datalist id="team-suggestions-b"></datalist>

                <input type="hidden" name="lang" id="lang-input" value="{{ lang or 'en' }}">
                <button type="submit" class="btn-analyze" data-i18n="btn" id="txt-btn">Generate Insight</button>
            </form>
            <div id="loader">
                <span class="spinner"></span>
                <span data-i18n="loader" id="txt-loader">Processing match variables...</span>
            </div>
        </div>
    </div>

    <script>
        let translations = {};
        let teamsByLeague = {};
        let currentLang = localStorage.getItem('preferredLang') || "{{ lang or 'en' }}";

        function populateSuggestions(gridId, datalistId) {
            const grid = document.getElementById(gridId);
            const activeBtn = grid.querySelector('.league-btn.active');
            const league = activeBtn ? activeBtn.getAttribute('data-value') : 'PL';
            const datalist = document.getElementById(datalistId);
            const teams = teamsByLeague[league] || [];
            datalist.innerHTML = teams.map(t => `<option value="${t.name}">`).join('');
        }

        async function loadTranslations() {
            try {
                const resp = await fetch('/static/translations.json');
                translations = await resp.json();
                applyLang(currentLang);
            } catch (e) {
                console.error('Failed to load translations', e);
            }
        }

        async function loadTeams() {
            try {
                const resp = await fetch('/api/teams');
                teamsByLeague = await resp.json();
                populateSuggestions('grid-a', 'team-suggestions-a');
                populateSuggestions('grid-b', 'team-suggestions-b');
            } catch (e) {
                console.error('Failed to load teams', e);
            }
        }

        document.querySelectorAll('.league-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const grid = this.parentElement;
                const hiddenInput = grid.nextElementSibling;
                const value = this.getAttribute('data-value');
                grid.querySelectorAll('.league-btn').forEach(b => {
                    b.classList.remove('active');
                    b.setAttribute('aria-checked', 'false');
                });
                this.classList.add('active');
                this.setAttribute('aria-checked', 'true');
                hiddenInput.value = value;

                const gridId = grid.id;
                const datalistId = gridId === 'grid-a' ? 'team-suggestions-a' : 'team-suggestions-b';
                populateSuggestions(gridId, datalistId);
            });
        });

        function applyLang(lang) {
            const data = translations[lang];
            if (!data) return;
            const html = document.getElementById('html-tag');
            html.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
            html.setAttribute('lang', lang);

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (data[key] !== undefined) {
                    el.innerText = data[key];
                }
            });
            document.querySelectorAll('[data-i18n-league]').forEach(el => {
                const key = el.getAttribute('data-i18n-league');
                if (data.leagues && data.leagues[key] !== undefined) {
                    el.innerText = data.leagues[key];
                }
            });
            document.getElementById('lang-input').value = lang;
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            localStorage.setItem('preferredLang', currentLang);
            applyLang(currentLang);
        }

        function showLoader() {
            document.getElementById('loader').classList.add('visible');
        }

        loadTranslations();
        loadTeams();
    </script>
</body>
</html>
